# Bugfix Pipeline — 4 stages, followed by human acceptance
#
# Shorter circuit for bug fixes: skip the baseline-establishment stage and
# the independent interface-test stage. Human acceptance is not a child stage.

pipeline:
  name: bugfix
  description: "Short pipeline: plan → implement → basic tests → code review → human acceptance"

  stages:
    - id: 1
      name: Plan (lite)
      role: planner
      initial_status: todo
      produces: [.harness/specs/prd.md, .harness/specs/business-test-cases.md]
      # No separate design.md for simple fixes

    - id: 2
      name: Implement
      role: implementer
      initial_status: backlog
      produces: [code, .harness/specs/tech-test-cases.md]

    - id: 3
      name: Run Basic Test Gate
      role: gate-runner
      initial_status: backlog
      gate:
        type: script
        script: baseline.py diff
        hard: true
        on_fail: rework stage 2

    - id: 4
      name: Code Review Gate
      role: reviewer
      initial_status: backlog
      produces: [.harness/review/review-verdict.yaml]
      gate:
        type: soft
        hard: false

  human_gates:
    - after_stage: 4
      name: Acceptance
      description: "Human verifies fix"

  circuit_breaker:
    threshold: 3
    action: assign parent to human
